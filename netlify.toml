[build]
publish = "public"
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[build.environment]
HUGO_VERSION = "0.155.3"
HUGO_ENV = "production"

# This ensures Netlify fetches your PaperMod submodule
[build.processing]
skip_node_bundling = true

[context.production]
environment = { HUGO_ENABLEGITINFO = "true" }
