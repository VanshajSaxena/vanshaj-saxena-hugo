{{- if .Parent.IsHome -}} {{- else -}}
<div class="comments">
  <script
    src="https://giscus.app/client.js"
    data-repo="VanshajSaxena/vanshajsaxena.com"
    data-repo-id="R_kgDOM7rQug"
    data-category="General"
    data-category-id="DIC_kwDOM7rQus4C3CCJ"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-lang="en"
    data-theme="https://vanshajsaxena.com/css/giscus-light.css"
    crossorigin="anonymous"
    async
  ></script>

  <script>
    function getGiscusTheme() {
      const htmlTheme = document.documentElement.getAttribute("data-theme");

      const base = "https://vanshajsaxena.com/css/";

      if (htmlTheme === "dark") return base + "giscus-dark.css";
      if (htmlTheme === "light") return base + "giscus-light.css";

      const savedTheme = localStorage.getItem("pref-theme");
      if (savedTheme === "dark") return base + "giscus-dark.css";

      return window.matchMedia("(prefers-color-scheme: dark)").matches
        ? base + "giscus-dark.css"
        : base + "giscus-light.css";
    }

    function updateGiscusTheme() {
      const iframe = document.querySelector("iframe.giscus-frame");
      if (!iframe) return;

      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: getGiscusTheme() } } },
        "https://giscus.app",
      );
    }

    window.addEventListener("message", (event) => {
      if (event.origin !== "https://giscus.app") return;
      if (!(typeof event.data === "object" && event.data.giscus)) return;

      updateGiscusTheme();
    });

    const observer = new MutationObserver(() => {
      updateGiscusTheme();
    });

    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-theme"],
    });
  </script>
</div>
{{- end -}}
